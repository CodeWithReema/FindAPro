{% if history %}
<div class="mt-12 pt-8 border-t border-gray-100">
    <div class="flex items-center justify-between mb-6">
        <h2 class="font-display font-bold text-lg text-gray-900">Saved Results</h2>
        <span class="text-xs text-gray-400">{{ history|length }} saved</span>
    </div>
    <div class="space-y-4">
        {% for item in history %}
        <div class="bg-white border border-gray-100 rounded-xl overflow-hidden shadow-sm" id="history-{{ item.pk }}">
            <div class="flex items-center justify-between px-5 py-3 bg-gray-50 border-b border-gray-100">
                <div class="flex items-center gap-2">
                    <span class="text-xs font-semibold text-gray-500 uppercase tracking-wide">{{ item.tool_label }}</span>
                    <span class="text-gray-300">·</span>
                    <span class="text-xs text-gray-400">{{ item.created_at|date:"M j, Y g:i A" }}</span>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="copyHistoryResult('history-{{ item.pk }}')" class="text-xs text-gray-400 hover:text-brand-600 transition-colors flex items-center gap-1">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        Copy
                    </button>
                    <button onclick="deleteResult({{ item.pk }})" class="text-xs text-gray-400 hover:text-red-500 transition-colors flex items-center gap-1">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        Delete
                    </button>
                </div>
            </div>
            <div class="px-5 py-4">
                <p class="text-gray-700 text-sm leading-relaxed whitespace-pre-wrap history-text">{{ item.result }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endif %}
